<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Tic-Tac-Toe — Offline</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .offline-card {
        background: rgba(255,255,255,0.12);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 20px;
        padding: 48px 32px;
        max-width: 380px;
        width: 100%;
      }
      .offline-icon { font-size: 3.5rem; margin-bottom: 16px; }
      h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
      p { font-size: 1rem; opacity: 0.85; line-height: 1.5; margin-bottom: 24px; }
      .retry-btn {
        display: inline-block;
        background: #fff;
        color: #667eea;
        border: none;
        border-radius: 10px;
        padding: 14px 32px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        min-height: 48px;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        transition: transform 200ms ease, box-shadow 200ms ease;
      }
      .retry-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
      .retry-btn:active { transform: scale(0.96); }
    </style>
  </head>
  <body>
    <div class="offline-card">
      <div class="offline-icon" aria-hidden="true">📡</div>
      <h1>You're Offline</h1>
      <p>Tic-Tac-Toe needs an internet connection to load for the first time. Please reconnect and try again.</p>
      <button class="retry-btn" onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
