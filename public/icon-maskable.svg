<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background for maskable safe zone (center 80%) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Grid lines (inset for safe zone) -->
  <line x1="210" y1="115" x2="210" y2="397" stroke="rgba(255,255,255,0.3)" stroke-width="7" stroke-linecap="round"/>
  <line x1="302" y1="115" x2="302" y2="397" stroke="rgba(255,255,255,0.3)" stroke-width="7" stroke-linecap="round"/>
  <line x1="115" y1="210" x2="397" y2="210" stroke="rgba(255,255,255,0.3)" stroke-width="7" stroke-linecap="round"/>
  <line x1="115" y1="302" x2="397" y2="302" stroke="rgba(255,255,255,0.3)" stroke-width="7" stroke-linecap="round"/>
  <!-- X — top-left cell -->
  <line x1="138" y1="138" x2="186" y2="186" stroke="#fff" stroke-width="14" stroke-linecap="round"/>
  <line x1="186" y1="138" x2="138" y2="186" stroke="#fff" stroke-width="14" stroke-linecap="round"/>
  <!-- X — center cell -->
  <line x1="234" y1="234" x2="278" y2="278" stroke="#fff" stroke-width="14" stroke-linecap="round"/>
  <line x1="278" y1="234" x2="234" y2="278" stroke="#fff" stroke-width="14" stroke-linecap="round"/>
  <!-- O — top-right cell -->
  <circle cx="350" cy="162" r="28" fill="none" stroke="#fff" stroke-width="12"/>
  <!-- O — bottom-left cell -->
  <circle cx="162" cy="350" r="28" fill="none" stroke="#fff" stroke-width="12"/>
</svg>
